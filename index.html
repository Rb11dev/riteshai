<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handy AI — Gesture Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#7cffc4;
  --accent2:#ff6bca;
  --accent3:#6bb5ff;
  --bg:#03020a;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.10);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Mono',monospace;color:#fff}

/* NOISE OVERLAY */
#noise{position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:0.025}

/* TOP STRIPE */
#topStripe{position:fixed;top:0;left:0;right:0;height:2px;z-index:999;background:var(--accent);transition:background 0.5s}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transition:opacity 0.8s}
#splash.hidden{opacity:0;pointer-events:none}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,8vw,7rem);background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.subtitle{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.rings{position:relative;width:160px;height:160px;margin:1rem 0}
.ring{position:absolute;border-radius:50%;border:1.5px solid;animation:pulse 2.4s ease-in-out infinite}
.ring:nth-child(1){inset:0;border-color:rgba(124,255,196,0.5);animation-delay:0s}
.ring:nth-child(2){inset:20px;border-color:rgba(107,181,255,0.4);animation-delay:0.4s}
.ring:nth-child(3){inset:40px;border-color:rgba(255,107,202,0.3);animation-delay:0.8s}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.08);opacity:1}}
.pills{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center}
.pill{padding:0.35rem 1rem;border-radius:100px;border:1px solid var(--glass-border);background:var(--glass);font-size:0.7rem;letter-spacing:0.1em;color:rgba(255,255,255,0.6);backdrop-filter:blur(8px)}
.cta{padding:0.9rem 2.5rem;border-radius:100px;border:none;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;position:relative;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 0 30px rgba(124,255,196,0.4)}
.cta:hover{transform:scale(1.04);box-shadow:0 0 50px rgba(124,255,196,0.6)}
.note{font-size:0.65rem;color:rgba(255,255,255,0.25);letter-spacing:0.05em}

/* CANVAS LAYERS */
video,canvas{position:fixed;top:0;left:0;width:100%;height:100%}
video{z-index:10;object-fit:cover;transform:scaleX(-1);filter:brightness(0.25)}
#bgCanvas{z-index:11}
#fxCanvas{z-index:12}
#drawCanvas{z-index:13}

/* TOP BAR */
#topBar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:500;display:flex;align-items:center;gap:0.75rem;padding:0.5rem 1rem;border-radius:100px;background:rgba(3,2,10,0.6);border:1px solid var(--glass-border);backdrop-filter:blur(16px);transition:opacity 0.5s}
#topBar.hidden{opacity:0;pointer-events:none}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.beta{font-size:0.55rem;padding:2px 6px;border-radius:4px;background:rgba(124,255,196,0.15);color:var(--accent);letter-spacing:0.1em;font-family:'DM Mono',monospace;-webkit-text-fill-color:var(--accent)}
.modeSwitcher{display:flex;gap:2px;padding:3px;border-radius:100px;background:rgba(0,0,0,0.3)}
.modeBtn{padding:0.3rem 0.8rem;border-radius:100px;border:none;background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.7rem;transition:all 0.2s;display:flex;align-items:center;gap:4px}
.modeBtn.active{background:rgba(255,255,255,0.1);color:#fff}
.modeBtn.active[data-mode="play"]{box-shadow:0 0 10px rgba(124,255,196,0.4);color:var(--accent)}
.modeBtn.active[data-mode="shapes"]{box-shadow:0 0 10px rgba(255,107,202,0.4);color:var(--accent2)}
.modeBtn.active[data-mode="write"]{box-shadow:0 0 10px rgba(107,181,255,0.4);color:var(--accent3)}
.chip{padding:0.25rem 0.6rem;border-radius:100px;background:var(--glass);border:1px solid var(--glass-border);font-size:0.65rem;display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace}
.camDot{width:6px;height:6px;border-radius:50%;background:#444;transition:background 0.3s}
.camDot.live{background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* BOTTOM HUD */
#bottomHUD{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;padding:0.45rem 1.2rem;border-radius:100px;background:rgba(3,2,10,0.7);border:1px solid var(--glass-border);backdrop-filter:blur(16px);display:flex;align-items:center;gap:8px;font-size:0.75rem;transition:opacity 0.5s}
#bottomHUD.hidden{opacity:0;pointer-events:none}
.hudDot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}

/* HELP PANEL */
#helpPanel{position:fixed;bottom:20px;right:20px;z-index:500;padding:1rem 1.25rem;border-radius:12px;background:rgba(3,2,10,0.7);border:1px solid var(--glass-border);backdrop-filter:blur(16px);max-width:200px;transition:opacity 0.5s}
#helpPanel.hidden{opacity:0;pointer-events:none}
.helpTitle{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.6rem}
.helpTip{font-size:0.65rem;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:0.25rem}

/* SHAKE RING */
#shakeRing{position:fixed;bottom:80px;right:30px;z-index:500;display:none}
#shakeRing svg{transform:rotate(-90deg)}

/* CLEAR BTN */
#clearBtn{position:fixed;bottom:130px;right:24px;z-index:500;padding:0.4rem 0.9rem;border-radius:100px;border:1px solid rgba(107,181,255,0.4);background:rgba(107,181,255,0.1);color:var(--accent3);font-family:'DM Mono',monospace;font-size:0.65rem;cursor:pointer;display:none;transition:all 0.2s}
#clearBtn:hover{background:rgba(107,181,255,0.2)}

/* TOAST */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);z-index:600;font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,4rem);pointer-events:none;opacity:0;transition:opacity 0.2s;text-align:center}
#toast.show{animation:toastIn 1.6s ease forwards}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.85)}10%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}

@media(max-width:600px){
  .modeLabel{display:none}
  .pills{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<!-- NOISE -->
<svg id="noise" xmlns="http://www.w3.org/2000/svg"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#grain)"/></svg>

<!-- TOP STRIPE -->
<div id="topStripe"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">Handy AI</div>
  <div class="subtitle">Gesture Intelligence Platform</div>
  <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
  <div class="pills">
    <div class="pill">Real-time Tracking</div>
    <div class="pill">Gesture Physics</div>
    <div class="pill">Air Drawing</div>
  </div>
  <button class="cta" id="enterBtn">Enter Experience</button>
  <div class="note">Camera access required · Best in Chrome / Edge</div>
</div>

<!-- VIDEO -->
<video id="video" autoplay playsinline muted></video>

<!-- CANVASES -->
<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<canvas id="drawCanvas"></canvas>

<!-- TOP BAR -->
<div id="topBar" class="hidden">
  <div class="brand">Handy AI</div>
  <div class="beta">BETA</div>
  <div class="modeSwitcher">
    <button class="modeBtn active" data-mode="play"><span>▶</span><span class="modeLabel">Play</span></button>
    <button class="modeBtn" data-mode="shapes"><span>♥</span><span class="modeLabel">Shapes</span></button>
    <button class="modeBtn" data-mode="write"><span>✏</span><span class="modeLabel">Write</span></button>
  </div>
  <div class="chip"><div class="camDot" id="camDot"></div><span id="fpsDisplay">0</span> fps</div>
  <div class="chip">👤 <span id="handCount">0</span></div>
</div>

<!-- BOTTOM HUD -->
<div id="bottomHUD" class="hidden">
  <div class="hudDot" id="hudDot"></div>
  <span id="gestureLabel">Detecting...</span>
</div>

<!-- HELP PANEL -->
<div id="helpPanel" class="hidden">
  <div class="helpTitle">Tips</div>
  <div id="helpContent"></div>
</div>

<!-- SHAKE RING -->
<div id="shakeRing">
  <svg width="60" height="60" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
    <circle id="shakeProgress" cx="30" cy="30" r="24" fill="none" stroke="var(--accent3)" stroke-width="4" stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round"/>
  </svg>
</div>

<!-- CLEAR BUTTON -->
<button id="clearBtn">🗑 Clear Canvas</button>

<!-- TOAST -->
<div id="toast"></div>

<!-- MediaPipe via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let mode = 'play';
let hands = null;
let currentResults = null;
let frameCount = 0, fps = 0, lastFpsTime = 0;
let audioCtx = null;
let humOsc = null, humGain = null;
let started = false;

// Canvas refs
const video = document.getElementById('video');
const bgCanvas = document.getElementById('bgCanvas');
const fxCanvas = document.getElementById('fxCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const bgCtx = bgCanvas.getContext('2d');
const fxCtx = fxCanvas.getContext('2d');
const drawCtx = drawCanvas.getContext('2d');

// Particles & ripples
let particles = [], ripples = [];

// Write mode state
let drawPaths = [], activePath = null, isDrawing = false;
let drawHue = 0;
let lastPinch = false;
let shakeHistory = [], shakeReversals = 0, lastShakeDir = 0, shakeCooldown = 0;
let shakeProg = 0;

// Play mode prev pinch
let prevPinch0 = false, prevPinch1 = false;
let prevHandDist = 0;
let time = 0;

// Shapes mode prev gesture
let prevGesture = '';
let gestureHoldCount = 0;

// Velocity for matrix rain
let handVelocity = 0;
let prevWrist = null;

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  [bgCanvas, fxCanvas, drawCanvas].forEach(c => { c.width = W; c.height = H; });
  initMatrix();
}
window.addEventListener('resize', resize);

// ─── MATRIX RAIN ─────────────────────────────────────────────────────────────
let matrixCols = [], matrixDrops = [], matrixHue = 0;
const KATAKANA = ''.split('').concat(
  Array.from({length:96},(_,i)=>String.fromCharCode(0x30A0+i))
).join('');

function initMatrix() {
  const W = bgCanvas.width;
  const cols = Math.floor(W / 15);
  matrixDrops = Array.from({length:cols},()=>Math.random()*bgCanvas.height/15);
}

function drawMatrix() {
  const W = bgCanvas.width, H = bgCanvas.height;
  const speed = Math.min(3, 1 + handVelocity * 0.05);
  const fadeAlpha = Math.min(0.25, 0.12 + handVelocity * 0.003);
  
  bgCtx.globalCompositeOperation = 'source-over';
  bgCtx.fillStyle = `rgba(3,2,10,${fadeAlpha})`;
  bgCtx.fillRect(0, 0, W, H);

  matrixHue = (matrixHue + 0.3) % 360;
  bgCtx.font = '15px "DM Mono", monospace';
  bgCtx.fillStyle = `hsl(${matrixHue},100%,60%)`;

  const cols = Math.floor(W / 15);
  if (matrixDrops.length !== cols) initMatrix();

  for (let i = 0; i < cols; i++) {
    const ch = KATAKANA[Math.floor(Math.random() * KATAKANA.length)] || 'ア';
    const x = i * 15, y = matrixDrops[i] * 15;
    bgCtx.fillStyle = `hsl(${(matrixHue + i*3)%360},100%,65%)`;
    bgCtx.fillText(ch, x, y);
    if (y > H && Math.random() > 0.975) matrixDrops[i] = 0;
    matrixDrops[i] += speed;
  }
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  humOsc = audioCtx.createOscillator();
  humGain = audioCtx.createGain();
  humOsc.type = 'sine';
  humOsc.frequency.value = 80;
  humGain.gain.value = 0;
  humOsc.connect(humGain);
  humGain.connect(audioCtx.destination);
  humOsc.start();
}

function playZap() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(700, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function playPop() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  const f = 300 + Math.random() * 200;
  o.frequency.setValueAtTime(f, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f * 0.5, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg, color) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = color || '#fff';
  el.style.textShadow = `0 0 40px ${color||'#fff'}`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 1600);
}

// ─── PARTICLES & RIPPLES ─────────────────────────────────────────────────────
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 45, maxLife: 45,
      size: 2 + Math.random() * 3,
      color: color || `hsl(${Math.random()*360},100%,70%)`
    });
  }
}

function spawnRipple(x, y, color) {
  ripples.push({ x, y, r: 0, maxR: 80, color: color || '#fff', life: 1 });
}

function updateParticlesRipples() {
  fxCtx.globalCompositeOperation = 'screen';
  
  // Particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life--;
    const alpha = p.life / p.maxLife;
    const size = p.size * alpha;
    fxCtx.globalAlpha = alpha;
    fxCtx.fillStyle = p.color;
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, size, 0, Math.PI*2);
    fxCtx.fill();
  }

  // Ripples
  ripples = ripples.filter(r => r.r < r.maxR);
  for (const r of ripples) {
    r.r += 3;
    const alpha = 1 - r.r / r.maxR;
    fxCtx.globalAlpha = alpha * 0.7;
    fxCtx.strokeStyle = r.color;
    fxCtx.lineWidth = 2;
    fxCtx.beginPath();
    fxCtx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    fxCtx.stroke();
    fxCtx.beginPath();
    fxCtx.arc(r.x, r.y, r.r * 0.6, 0, Math.PI*2);
    fxCtx.stroke();
  }
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function lmPx(lm) {
  return { x: (1 - lm.x) * fxCanvas.width, y: lm.y * fxCanvas.height };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function distLm(lms, i, j) {
  const a = lmPx(lms[i]), b = lmPx(lms[j]);
  return dist(a, b);
}

function normDist(lms, i, j) {
  return Math.hypot(lms[i].x - lms[j].x, lms[i].y - lms[j].y);
}

function fingerSpread(lms) {
  // Average distance of finger tips from palm center
  const palm = lmPx(lms[0]);
  const tips = [4,8,12,16,20].map(i=>lmPx(lms[i]));
  return tips.reduce((s,t)=>s+dist(palm,t),0)/5 / Math.max(fxCanvas.width, fxCanvas.height);
}

function fingerExtended(lms, tipIdx, baseIdx) {
  return normDist(lms, tipIdx, 0) > normDist(lms, baseIdx, 0);
}

// ─── HAND SKELETON ───────────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function drawHandSkeleton(lms, hue, alpha=1) {
  fxCtx.globalAlpha = alpha;
  fxCtx.globalCompositeOperation = 'screen';
  for (const [a,b] of CONNECTIONS) {
    const pa = lmPx(lms[a]), pb = lmPx(lms[b]);
    const grad = fxCtx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    grad.addColorStop(0, `hsl(${hue},100%,65%)`);
    grad.addColorStop(1, `hsl(${(hue+40)%360},100%,65%)`);
    fxCtx.strokeStyle = grad;
    fxCtx.lineWidth = 2;
    fxCtx.shadowBlur = 8;
    fxCtx.shadowColor = `hsl(${hue},100%,65%)`;
    fxCtx.beginPath();
    fxCtx.moveTo(pa.x, pa.y);
    fxCtx.lineTo(pb.x, pb.y);
    fxCtx.stroke();
  }
  // Fingertip blobs
  for (const tip of [4,8,12,16,20]) {
    const p = lmPx(lms[tip]);
    fxCtx.fillStyle = `hsl(${(hue+tip*10)%360},100%,80%)`;
    fxCtx.shadowBlur = 15;
    fxCtx.shadowColor = `hsl(${hue},100%,65%)`;
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, 5, 0, Math.PI*2);
    fxCtx.fill();
  }
  fxCtx.shadowBlur = 0;
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';
}

// ─── LIGHTNING BOLT ──────────────────────────────────────────────────────────
function drawLightning(x1,y1,x2,y2,color,segments=8) {
  fxCtx.save();
  fxCtx.globalCompositeOperation='screen';
  fxCtx.strokeStyle=color;
  fxCtx.lineWidth=2;
  fxCtx.shadowBlur=15;
  fxCtx.shadowColor=color;
  fxCtx.beginPath();
  let cx=x1,cy=y1;
  for(let i=1;i<=segments;i++){
    const t=i/segments;
    const nx=x1+(x2-x1)*t+(Math.random()-0.5)*40;
    const ny=y1+(y2-y1)*t+(Math.random()-0.5)*40;
    fxCtx.moveTo(cx,cy);
    fxCtx.lineTo(nx,ny);
    cx=nx; cy=ny;
  }
  fxCtx.moveTo(cx,cy);
  fxCtx.lineTo(x2,y2);
  fxCtx.stroke();
  fxCtx.restore();
}

// ─── MANDALA ─────────────────────────────────────────────────────────────────
function drawMandala(tips, cx, cy, rot) {
  fxCtx.save();
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.translate(cx, cy);
  fxCtx.rotate(rot);
  fxCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  fxCtx.lineWidth = 1;
  fxCtx.beginPath();
  for (let i = 0; i < tips.length; i++) {
    const a = (i / tips.length) * Math.PI * 2;
    const r = 80 + Math.sin(time * 2 + i) * 20;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) fxCtx.moveTo(x, y); else fxCtx.lineTo(x, y);
  }
  fxCtx.closePath();
  fxCtx.stroke();
  fxCtx.restore();
}

// ─── HEART SHAPE ─────────────────────────────────────────────────────────────
function drawHeart(cx, cy, scale) {
  const pulse = 1 + Math.sin(time * 4) * 0.05;
  const s = scale * pulse;
  fxCtx.save();
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.translate(cx, cy);
  fxCtx.scale(s, s);
  
  const grad = fxCtx.createRadialGradient(0,-20,5,0,0,80);
  grad.addColorStop(0,'rgba(255,150,200,0.9)');
  grad.addColorStop(0.5,'rgba(255,107,202,0.7)');
  grad.addColorStop(1,'rgba(255,0,150,0.1)');
  
  fxCtx.beginPath();
  for (let t = 0; t <= Math.PI*2; t += 0.02) {
    const x = 16 * Math.pow(Math.sin(t), 3) * 4;
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * 4;
    t === 0 ? fxCtx.moveTo(x,y) : fxCtx.lineTo(x,y);
  }
  fxCtx.closePath();
  fxCtx.fillStyle = grad;
  fxCtx.fill();
  fxCtx.strokeStyle = 'rgba(255,107,202,0.8)';
  fxCtx.lineWidth = 2;
  fxCtx.shadowBlur = 25;
  fxCtx.shadowColor = '#ff6bca';
  fxCtx.stroke();
  
  // Shine
  fxCtx.beginPath();
  fxCtx.ellipse(-15,-35,12,7,-0.5,0,Math.PI*2);
  fxCtx.fillStyle = 'rgba(255,255,255,0.35)';
  fxCtx.fill();
  fxCtx.restore();
}

// ─── PEACE SYMBOL ────────────────────────────────────────────────────────────
function drawPeace(cx, cy, size) {
  fxCtx.save();
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.strokeStyle = '#ff6bca';
  fxCtx.lineWidth = 3;
  fxCtx.shadowBlur = 20;
  fxCtx.shadowColor = '#ff6bca';
  fxCtx.beginPath();
  fxCtx.arc(cx, cy, size, 0, Math.PI*2);
  fxCtx.stroke();
  fxCtx.beginPath();
  fxCtx.moveTo(cx, cy-size);
  fxCtx.lineTo(cx, cy+size);
  fxCtx.moveTo(cx, cy);
  fxCtx.lineTo(cx + Math.cos(Math.PI/6+Math.PI)*size, cy + Math.sin(Math.PI/6+Math.PI)*size);
  fxCtx.moveTo(cx, cy);
  fxCtx.lineTo(cx + Math.cos(-Math.PI/6)*size, cy + Math.sin(-Math.PI/6)*size);
  fxCtx.stroke();
  fxCtx.restore();
}

// ─── STAR BURST ──────────────────────────────────────────────────────────────
function drawStar(cx, cy, rot) {
  fxCtx.save();
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.translate(cx, cy);
  fxCtx.rotate(rot);
  const pts = 8, outerR = 90, innerR = 40;
  const grad = fxCtx.createRadialGradient(0,0,0,0,0,outerR);
  grad.addColorStop(0,'rgba(255,255,255,0.95)');
  grad.addColorStop(0.3,'rgba(255,220,80,0.7)');
  grad.addColorStop(1,'rgba(255,180,0,0)');
  fxCtx.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?outerR:innerR;
    const a=(i/pts)*Math.PI;
    i===0?fxCtx.moveTo(Math.cos(a)*r,Math.sin(a)*r):fxCtx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  fxCtx.closePath();
  fxCtx.fillStyle=grad;
  fxCtx.fill();
  fxCtx.restore();
}

// ─── GESTURE DETECTION ───────────────────────────────────────────────────────
function detectGestureShapes(allLms) {
  if (allLms.length < 2) {
    const lms = allLms[0];
    if (!lms) return 'none';
    const spread = fingerSpread(lms);
    const idxUp = normDist(lms,8,0) > 0.18;
    const midUp = normDist(lms,12,0) > 0.18;
    const ringDown = normDist(lms,16,0) < 0.16;
    const pinkyDown = normDist(lms,20,0) < 0.16;
    if (idxUp && midUp && ringDown && pinkyDown) return 'peace';
    return 'none';
  }
  const lms0 = allLms[0], lms1 = allLms[1];
  const palmDist = Math.hypot(lms0[0].x-lms1[0].x, lms0[0].y-lms1[0].y);
  const spread0 = fingerSpread(lms0), spread1 = fingerSpread(lms1);
  if (palmDist < 0.35 && spread0 > 0.09 && spread1 > 0.09) return 'heart';
  if (spread0 < 0.09 && spread1 < 0.09) return 'star';
  return 'none';
}

// ─── PLAY MODE ───────────────────────────────────────────────────────────────
function renderPlay(allLms) {
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  if (allLms.length === 0) {
    updateParticlesRipples();
    if (humGain) humGain.gain.setTargetAtTime(0, audioCtx?.currentTime||0, 0.3);
    return;
  }

  for (let hi = 0; hi < allLms.length; hi++) {
    const lms = allLms[hi];
    const hue = (time * 30 + hi * 120) % 360;
    drawHandSkeleton(lms, hue);
    
    // Sparkle from fingertips
    for (const tip of [4,8,12,16,20]) {
      if (Math.random() < 0.3) {
        const p = lmPx(lms[tip]);
        spawnParticles(p.x, p.y, 1, `hsl(${hue},100%,70%)`);
      }
    }

    // Pinch detection
    const pinching = normDist(lms, 4, 8) < 0.055;
    const isPrev = hi === 0 ? prevPinch0 : prevPinch1;
    if (pinching && !isPrev) {
      const pt = lmPx(lms[4]);
      spawnRipple(pt.x, pt.y, `hsl(${hue},100%,70%)`);
      spawnParticles(pt.x, pt.y, 12, `hsl(${hue},100%,70%)`);
      playZap();
      showToast('⚡ Pinch', '#7cffc4');
    }
    if (hi === 0) prevPinch0 = pinching;
    else prevPinch1 = pinching;
  }

  // Two-hand interaction
  if (allLms.length >= 2) {
    const lms0 = allLms[0], lms1 = allLms[1];
    
    // Inter-fingertip gradient lines
    fxCtx.globalCompositeOperation = 'screen';
    for (const tip of [4,8,12,16,20]) {
      const a = lmPx(lms0[tip]), b = lmPx(lms1[tip]);
      const d = dist(a,b);
      if (d < 140) {
        drawLightning(a.x,a.y,b.x,b.y,'rgba(255,200,100,0.8)');
      } else {
        const grad = fxCtx.createLinearGradient(a.x,a.y,b.x,b.y);
        grad.addColorStop(0,`hsla(${(time*30)%360},100%,65%,0.5)`);
        grad.addColorStop(1,`hsla(${(time*30+120)%360},100%,65%,0.5)`);
        fxCtx.strokeStyle = grad;
        fxCtx.lineWidth = 1;
        fxCtx.beginPath();
        fxCtx.moveTo(a.x,a.y);
        fxCtx.lineTo(b.x,b.y);
        fxCtx.stroke();
      }
    }

    // Mandala
    const allTips = [4,8,12,16,20].flatMap(t=>[lmPx(lms0[t]),lmPx(lms1[t])]);
    const cx = allTips.reduce((s,p)=>s+p.x,0)/allTips.length;
    const cy = allTips.reduce((s,p)=>s+p.y,0)/allTips.length;
    drawMandala(allTips, cx, cy, time);

    // Hum
    const w0 = lmPx(lms0[0]), w1 = lmPx(lms1[0]);
    const d = dist(w0,w1);
    const freq = 80 + d * 0.8;
    if (humOsc && humGain && audioCtx) {
      humOsc.frequency.setTargetAtTime(Math.min(360,freq), audioCtx.currentTime, 0.1);
      humGain.gain.setTargetAtTime(0.06, audioCtx.currentTime, 0.1);
    }
  } else {
    if (humGain && audioCtx) humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  }

  updateParticlesRipples();
  document.getElementById('gestureLabel').textContent = allLms.length > 0 ? '✋ Tracking' : 'Waiting...';
}

// ─── SHAPES MODE ─────────────────────────────────────────────────────────────
let starRot = 0;
function renderShapes(allLms) {
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  
  if (allLms.length === 0) {
    document.getElementById('gestureLabel').textContent = 'Show hands';
    updateParticlesRipples();
    return;
  }

  // Draw skeletons dimly
  for (let hi = 0; hi < allLms.length; hi++) {
    drawHandSkeleton(allLms[hi], 320, 0.35);
  }

  const gesture = detectGestureShapes(allLms);
  const W = fxCanvas.width, H = fxCanvas.height;
  const cx = W/2, cy = H/2;

  if (gesture !== prevGesture) { gestureHoldCount = 0; }
  else { gestureHoldCount++; }
  prevGesture = gesture;

  if (gesture === 'heart') {
    drawHeart(cx, cy, 1);
    if (gestureHoldCount === 5) { showToast('♥ Heart', '#ff6bca'); playPop(); }
    document.getElementById('gestureLabel').textContent = '♥ Heart';
  } else if (gesture === 'peace') {
    drawPeace(cx, cy, 70);
    if (gestureHoldCount === 5) { showToast('✌ Peace', '#ff6bca'); playPop(); }
    document.getElementById('gestureLabel').textContent = '✌ Peace';
  } else if (gesture === 'star') {
    starRot += 0.02;
    drawStar(cx, cy, starRot);
    if (gestureHoldCount === 5) {
      spawnParticles(cx, cy, 25, '#ffe066');
      showToast('💥 Star Burst!', '#ffe066');
      playZap();
    }
    document.getElementById('gestureLabel').textContent = '💥 Star Burst';
  } else {
    document.getElementById('gestureLabel').textContent = 'Show gesture';
  }

  updateParticlesRipples();
}

// ─── WRITE MODE ──────────────────────────────────────────────────────────────
function renderWrite(allLms) {
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  if (allLms.length === 0) {
    isDrawing = false;
    activePath = null;
    document.getElementById('gestureLabel').textContent = 'Show hand';
    return;
  }

  const lms = allLms[0];
  const indexTip = lmPx(lms[8]);
  const thumbTip = lmPx(lms[4]);
  const wrist = lmPx(lms[0]);

  // Draw skeleton dimly
  drawHandSkeleton(lms, 210, 0.3);

  // Pen down detection
  const indexExtended = normDist(lms, 8, 0) > 0.17;
  const pinching = normDist(lms, 4, 8) < 0.06;
  const penDown = indexExtended && !pinching;

  // Shake detection (open palm + wrist X reversals)
  const openPalm = [8,12,16,20].filter(t => normDist(lms, t, 0) > 0.15).length >= 3;
  
  if (openPalm && !penDown) {
    shakeHistory.push(wrist.x);
    if (shakeHistory.length > 30) shakeHistory.shift();
    if (shakeHistory.length >= 3 && shakeCooldown <= 0) {
      const dir = wrist.x - shakeHistory[shakeHistory.length-2] > 0 ? 1 : -1;
      if (lastShakeDir !== 0 && dir !== lastShakeDir) shakeReversals++;
      lastShakeDir = dir;
      if (shakeReversals > 0) {
        shakeProg = Math.min(1, shakeReversals / 6);
        const ring = document.getElementById('shakeProgress');
        const circumference = 150.8;
        ring.style.strokeDashoffset = circumference * (1 - shakeProg);
        const hue = 210 + shakeProg * 60;
        ring.style.stroke = `hsl(${hue},100%,65%)`;
      }
      if (shakeReversals >= 6) {
        drawPaths = [];
        activePath = null;
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        showToast('🌊 Canvas cleared', '#6bb5ff');
        playPop();
        shakeReversals = 0;
        shakeProg = 0;
        shakeCooldown = 120;
        document.getElementById('shakeProgress').style.strokeDashoffset = '150.8';
      }
    }
  } else {
    shakeHistory = [];
    shakeReversals = 0;
    lastShakeDir = 0;
    if (shakeProg > 0) {
      shakeProg = Math.max(0, shakeProg - 0.02);
      const ring = document.getElementById('shakeProgress');
      ring.style.strokeDashoffset = 150.8 * (1 - shakeProg);
    }
  }
  if (shakeCooldown > 0) shakeCooldown--;

  // Drawing logic
  if (penDown) {
    if (!isDrawing) {
      isDrawing = true;
      drawHue = (drawHue + 40) % 360;
      activePath = { points: [indexTip], hue: drawHue };
    } else {
      activePath.points.push(indexTip);
    }
    document.getElementById('gestureLabel').textContent = '✏ Drawing';
  } else {
    if (isDrawing && activePath && activePath.points.length > 1) {
      drawPaths.push(activePath);
      activePath = null;
    }
    isDrawing = false;
    document.getElementById('gestureLabel').textContent = pinching ? '✊ Pen up' : '☝ Point to draw';
  }

  // Render persistent paths
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const path of drawPaths) renderStroke(drawCtx, path);
  if (activePath) renderStroke(drawCtx, activePath);

  // Cursor at index tip
  if (penDown) {
    const pulse = 0.6 + Math.sin(time * 8) * 0.4;
    fxCtx.globalCompositeOperation = 'screen';
    fxCtx.globalAlpha = pulse;
    fxCtx.strokeStyle = `hsl(${drawHue},100%,70%)`;
    fxCtx.lineWidth = 2;
    fxCtx.shadowBlur = 12;
    fxCtx.shadowColor = `hsl(${drawHue},100%,70%)`;
    fxCtx.beginPath();
    fxCtx.arc(indexTip.x, indexTip.y, 10, 0, Math.PI*2);
    fxCtx.stroke();
    fxCtx.globalAlpha = 1;
    fxCtx.shadowBlur = 0;
    fxCtx.globalCompositeOperation = 'source-over';
  }
}

function renderStroke(ctx, path) {
  if (path.points.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = `hsl(${path.hue},100%,70%)`;
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowBlur = 12;
  ctx.shadowColor = `hsl(${path.hue},80%,60%)`;
  ctx.beginPath();
  ctx.moveTo(path.points[0].x, path.points[0].y);
  for (let i = 1; i < path.points.length - 1; i++) {
    const mx = (path.points[i].x + path.points[i+1].x) / 2;
    const my = (path.points[i].y + path.points[i+1].y) / 2;
    ctx.quadraticCurveTo(path.points[i].x, path.points[i].y, mx, my);
  }
  const last = path.points[path.points.length-1];
  ctx.lineTo(last.x, last.y);
  ctx.stroke();
  ctx.restore();
}

// ─── MAIN RENDER LOOP ────────────────────────────────────────────────────────
function renderLoop() {
  time += 0.016;
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fpsDisplay').textContent = fps;
    const dot = document.getElementById('camDot');
    fps > 5 ? dot.classList.add('live') : dot.classList.remove('live');
  }

  drawMatrix();

  const allLms = currentResults || [];
  document.getElementById('handCount').textContent = allLms.length;

  // Velocity
  if (allLms.length > 0) {
    const w = lmPx(allLms[0][0]);
    if (prevWrist) handVelocity = Math.min(20, dist(w, prevWrist));
    prevWrist = w;
  } else {
    handVelocity *= 0.9;
    prevWrist = null;
  }

  if (mode === 'play') renderPlay(allLms);
  else if (mode === 'shapes') renderShapes(allLms);
  else renderWrite(allLms);

  requestAnimationFrame(renderLoop);
}

// ─── MEDIAPIPE SETUP ─────────────────────────────────────────────────────────
async function initApp() {
  initAudio();

  // Webcam
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } }
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    showToast('Camera error!', '#ff6b6b');
    return;
  }

  // MediaPipe Hands
  hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.72,
    minTrackingConfidence: 0.72
  });
  hands.onResults(results => {
    currentResults = results.multiHandLandmarks || [];
  });

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  camera.start();

  resize();
  renderLoop();

  // Show UI
  document.getElementById('topBar').classList.remove('hidden');
  document.getElementById('bottomHUD').classList.remove('hidden');
  document.getElementById('helpPanel').classList.remove('hidden');
  updateHelpPanel();
}

// ─── MODE SWITCHING ───────────────────────────────────────────────────────────
const modeAccents = { play: '#7cffc4', shapes: '#ff6bca', write: '#6bb5ff' };
const helpText = {
  play: ['☝ Pinch: burst effect','🤲 Two hands: mandala','⚡ Tips close: lightning'],
  shapes: ['🤲 Palms close: heart','✌ Index+mid up: peace','✊ Both fists: star'],
  write: ['☝ Point: draw','🤞 Pinch: pen up','🖐 Shake palm: clear']
};

function setMode(m) {
  mode = m;
  document.querySelectorAll('.modeBtn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  const accent = modeAccents[m];
  document.getElementById('topStripe').style.background = accent;
  document.getElementById('hudDot').style.background = accent;
  document.getElementById('hudDot').style.boxShadow = `0 0 8px ${accent}`;

  const writeUi = ['clearBtn','shakeRing'];
  writeUi.forEach(id => {
    document.getElementById(id).style.display = m === 'write' ? (id === 'shakeRing' ? 'block' : 'block') : 'none';
  });

  if (m !== 'write') {
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    drawPaths = [];
    activePath = null;
  }
  updateHelpPanel();
}

function updateHelpPanel() {
  const tips = helpText[mode];
  document.getElementById('helpContent').innerHTML = tips.map(t=>`<div class="helpTip">${t}</div>`).join('');
}

document.querySelectorAll('.modeBtn').forEach(b => {
  b.addEventListener('click', () => setMode(b.dataset.mode));
});

document.getElementById('clearBtn').addEventListener('click', () => {
  drawPaths = [];
  activePath = null;
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  showToast('🌊 Canvas cleared', '#6bb5ff');
  playPop();
});

// ─── SPLASH ───────────────────────────────────────────────────────────────────
document.getElementById('enterBtn').addEventListener('click', async () => {
  initAudio();
  document.getElementById('splash').classList.add('hidden');
  setTimeout(initApp, 800);
});

// Init stripe color on load
document.getElementById('topStripe').style.background = '#7cffc4';
</script>
